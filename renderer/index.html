<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>AliasistAbductor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="22" stroke="#6c63ff" stroke-width="3" fill="#1a1a2e"/>
          <path d="M24 12 L24 30 M16 22 L24 32 L32 22" stroke="#6c63ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 36 L34 36" stroke="#6c63ff" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h1 class="header-title">AliasistAbductor</h1>
      </div>
      <p class="header-subtitle">Free Direct File Downloader</p>
    </header>

    <main class="main">
      <section class="download-section">
        <div class="form-group">
          <label for="url-input" class="form-label">File URL</label>
          <div class="url-input-wrapper">
            <input
              type="url"
              id="url-input"
              class="form-input"
              placeholder="https://example.com/file.zip"
              aria-describedby="url-help"
            />
          </div>
          <p id="url-help" class="form-hint">Enter a direct download URL (http or https)</p>
        </div>

        <div class="form-group">
          <label class="form-label">Save Location</label>
          <div class="directory-wrapper">
            <input
              type="text"
              id="directory-input"
              class="form-input"
              placeholder="Select a folder..."
              readonly
              aria-label="Save directory"
            />
            <button id="browse-btn" class="btn btn-secondary" aria-label="Browse for folder">
              Browse
            </button>
          </div>
        </div>

        <button id="download-btn" class="btn btn-primary" disabled aria-live="polite">
          Download
        </button>
      </section>

      <section class="progress-section" id="progress-section" hidden>
        <div class="progress-header">
          <span id="progress-label" class="progress-label">Downloading...</span>
          <span id="progress-percent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="progress-label">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <p id="progress-details" class="progress-details"></p>
      </section>

      <section class="status-section" id="status-section" hidden>
        <div id="status-message" class="status-message" role="alert"></div>
      </section>
    </main>

    <footer class="footer">
      <p>AliasistAbductor &mdash; Open source &amp; free forever</p>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
