    <!--
      Clerk-gated bootloader. Uses the same Clerk instance as aliasist.com.
      The compiled SPA bundle is only loaded *after* a signed-in session is
      confirmed. We also install a window.fetch shim that auto-attaches the
      Clerk session token to every request hitting the DataSist API, so the
      bundle's existing admin CRUD fetches become authenticated without
      needing to rebuild the bundle.
    -->
    <script type="module">
      const CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuYWxpYXNpc3QuY29tJA";
      const CLERK_FRONTEND_API = "clerk.aliasist.com";
      const DATASIST_API_HOST = "datasist-api.bchooper0730.workers.dev";
      const BUNDLE_URL = "./assets/index-CISwspKe.js";

      const gate = document.getElementById("datasist-auth-gate");
      const gateMessage = document.getElementById("gate-message");
      const gateButton = document.getElementById("gate-signin");
      const gateFooter = document.getElementById("gate-footer");

      const setMessage = (text) => { gateMessage.textContent = text; };

      const loadScript = (src) => new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.crossOrigin = "anonymous";
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("Failed to load " + src));
        document.head.appendChild(s);
      });

      function installFetchShim(getToken) {
        const originalFetch = window.fetch.bind(window);
        window.fetch = async (input, init) => {
          let url;
          try {
            url = typeof input === "string"
              ? new URL(input, window.location.href)
              : new URL((input instanceof Request ? input.url : String(input)), window.location.href);
          } catch {
            return originalFetch(input, init);
          }

          const isDatasistApi = url.hostname === DATASIST_API_HOST
            || url.pathname.startsWith("/api/data-centers")
            || url.pathname === "/api/sync"
            || url.pathname === "/api/neon/sync";

          if (!isDatasistApi) {
            return originalFetch(input, init);
          }

          const token = await getToken().catch(() => null);
          if (!token) return originalFetch(input, init);

          const headers = new Headers(init?.headers ?? (input instanceof Request ? input.headers : undefined));
          if (!headers.has("Authorization")) {
            headers.set("Authorization", "Bearer " + token);
          }
          const nextInit = { ...(init ?? {}), headers };
          return originalFetch(input instanceof Request ? input.url : input, nextInit);
        };
      }

      async function bootstrap() {
        try {
          await loadScript("https://" + CLERK_FRONTEND_API + "/npm/@clerk/clerk-js@5/dist/clerk.browser.js");
          const clerk = new window.Clerk(CLERK_PUBLISHABLE_KEY);
          await clerk.load();

          if (!clerk.user) {
            setMessage("This area is admin-only. Sign in with your Aliasist account to continue.");
            gateButton.style.display = "inline-block";
            gateButton.addEventListener("click", () => {
              clerk.openSignIn({
                afterSignInUrl: window.location.href,
                afterSignUpUrl: window.location.href,
              });
            });
            clerk.addListener(({ user }) => {
              if (user) {
                gateButton.style.display = "none";
                void afterSignedIn(clerk);
              }
            });
            return;
          }

          await afterSignedIn(clerk);
        } catch (err) {
          console.error("[datasist-auth] bootstrap failed:", err);
          setMessage("Could not initialize authentication. Please reload the page.");
          gateFooter.textContent = String(err && err.message ? err.message : err);
        }
      }

      async function afterSignedIn(clerk) {
        setMessage("Verifying admin access…");

        const getToken = () => clerk.session ? clerk.session.getToken() : Promise.resolve(null);
        installFetchShim(getToken);

        // Confirm the server-side allow-list accepts this user before we
        // render the admin UI. /api/health is cheap and always returns 200,
        // so we probe /api/sync with a HEAD-equivalent? Simpler: let the
        // SPA render — all admin actions will 403 if the user isn't on the
        // allow-list, and the SPA already surfaces API errors.
        gate.remove();

        try {
          // eslint-disable-next-line no-unused-vars
          const mod = await import(BUNDLE_URL);
        } catch (err) {
          console.error("[datasist-auth] failed to load SPA bundle:", err);
          document.body.innerHTML = "<pre style=\"color:#fca5a5;padding:24px\">Failed to load DataSist. " + String(err) + "</pre>";
        }
      }

      void bootstrap();
    </script>
