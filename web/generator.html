<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aliasist | Image Abductor</title>
  <link rel="stylesheet" href="./src/index.css">
</head>
<body class="bg-black text-green-400 font-mono min-h-screen flex flex-col items-center p-8">

  <nav class="w-full max-w-4xl mb-12">
    <a href="/" class="hover:text-white transition-colors">&lt; Return to Mothership</a>
  </nav>

  <main class="w-full max-w-2xl border-2 border-green-500 rounded-lg p-8 shadow-[0_0_20px_rgba(34,197,94,0.3)] bg-zinc-950">
    <h1 class="text-3xl font-bold tracking-widest text-center mb-2 uppercase">Image Abductor</h1>
    <p class="text-center text-zinc-500 mb-8 italic">Materializing pixels from the Cloudflare void...</p>

    <div class="space-y-6">
      <div class="flex flex-col space-y-2">
        <label for="prompt" class="text-xs uppercase tracking-tighter text-zinc-400">Input Prompt</label>
        <input 
          type="text" 
          id="prompt" 
          placeholder="A neon UFO hovering over Aliasist-Workstation..." 
          class="bg-black border border-green-900 p-3 rounded text-green-400 focus:border-green-400 outline-none transition-all"
        />
      </div>

      <button 
        id="abductBtn" 
        class="w-full bg-green-500 text-black font-black py-4 rounded hover:bg-white hover:shadow-[0_0_15px_#fff] transition-all disabled:opacity-50 disabled:cursor-not-allowed uppercase"
      >
        Engage Tractor Beam
      </button>

      <div id="status" class="hidden text-center animate-pulse text-zinc-400">
        Processing neural link...
      </div>

      <div id="result-container" class="hidden space-y-4">
        <img id="outputImg" class="w-full rounded border border-zinc-800 shadow-2xl" src="" alt="Abducted Image" />
        <a 
          id="downloadBtn" 
          download="abducted-specimen.jpg" 
          class="block text-center text-sm underline text-zinc-500 hover:text-white"
        >
          Save Specimen to Local Drive
        </a>
      </div>
    </div>
  </main>

  <script type="module">
    const btn = document.getElementById('abductBtn');
    const img = document.getElementById('outputImg');
    const status = document.getElementById('status');
    const container = document.getElementById('result-container');
    const download = document.getElementById('downloadBtn');

    btn.onclick = async () => {
      const promptValue = document.getElementById('prompt').value;
      if (!promptValue) return alert("The void requires a prompt.");

      // UI State: Engaging
      btn.disabled = true;
      status.classList.remove('hidden');
      container.classList.add('hidden');

      try {
        const response = await fetch('https://dev.aliasist.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: promptValue })
        });

        if (!response.ok) throw new Error('Neural link severed.');

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        // Display Result
        img.src = imageUrl;
        download.href = imageUrl;
        container.classList.remove('hidden');
      } catch (err) {
        alert('Abduction failed: ' + err.message);
      } finally {
        btn.disabled = false;
        status.classList.add('hidden');
      }
    };
  </script>
</body>
</html>
