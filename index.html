<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aliasist — Logos</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0a0f0a;
        color: #f5f4f0;
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 48px;
        padding: 48px 24px;
      }

      h1 {
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #7a7a74;
      }

      .logos {
        display: flex;
        flex-wrap: wrap;
        gap: 48px;
        align-items: center;
        justify-content: center;
      }

      .logo-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .logo-card img {
        max-width: 320px;
        max-height: 320px;
        object-fit: contain;
        border-radius: 4px;
      }

      .logo-card span {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #7a7a74;
      }
    </style>
  </head>

  <body>
    <h1>Aliasist — Logo Concepts</h1>

    <div class="logos">
      <div class="logo-card">
        <img src="aliasistlogo.png" alt="Aliasist Logo" />
        <span>aliasistlogo.png</span>
      </div>

      <div class="logo-card">
        <img src="Alien cowboy and futuristic emblem logo.png" alt="Alien Cowboy and Futuristic Emblem Logo" />
        <span>Alien cowboy and futuristic emblem logo</span>
      </div>

      <div class="logo-card">
        <img src="alien_icon(PNG).png" alt="Alien Icon" />
        <span>alien_icon(PNG).png</span>
      </div>
    </div>
  </body>
</html>
